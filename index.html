<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhotoFrame OS v4.8 - Instant Album Bar</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        #viewport { position: relative; width: 100%; height: 100%; overflow: hidden; }

        #stage { position: absolute; width: 100%; height: 100%; z-index: 2; }

        /* --- Elegant Permanent Top Action Control Pill --- */
        .top-control-pill {
            position: absolute; top: 25px; left: 50%; 
            transform: translateX(-50%); -webkit-transform: translateX(-50%);
            z-index: 3000; background: rgba(30, 30, 30, 0.85); 
            padding: 10px 24px; border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .top-control-pill label {
            color: #fff; font-size: 0.85rem; font-weight: 600; 
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        .top-control-pill select {
            background: #000; border: 1px solid rgba(255, 255, 255, 0.3); 
            color: #fff; padding: 6px 16px; border-radius: 20px; 
            outline: none; font-size: 0.9rem; font-weight: bold; 
            min-width: 160px; cursor: pointer;
        }

        /* --- iOS Liquid Glass UI Architecture --- */
        .smart-widget-panel {
            position: absolute; bottom: 30px; right: 30px; z-index: 1000;
            background: rgba(30, 30, 30, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px; padding: 20px 30px; color: #fff; min-width: 240px;
            text-align: right;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: opacity 0.5s ease; -webkit-transition: opacity 0.5s ease;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .clock-time { font-size: 3.5rem; font-weight: 100; line-height: 1; letter-spacing: -1px; }
        .clock-date { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin: 6px 0 12px 0; color: rgba(255,255,255,0.8); }

        .weather-analytics-container { width: 100%; border-top: 1px solid rgba(255, 255, 255, 0.15); padding-top: 10px; }
        .weather-primary-row { font-size: 1.2rem; font-weight: 300; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="viewport">
        <div class="top-control-pill">
            <label>Album:</label>
            <select id="cfg-album" onchange="syncNewFolder(this.value, OS_STATE.duration)">
                <option value="">Loading repository...</option>
            </select>
        </div>

        <div id="stage"></div>
        
        <div class="smart-widget-panel" id="os-widget-card">
            <div class="clock-time" id="ui-time">00:00</div>
            <div class="clock-date" id="ui-date">SYNCHRONIZING</div>
            <div class="weather-analytics-container" id="ui-weather">
                <div style="font-size:0.8rem; color:rgba(255,255,255,0.4);">Awaiting Feed...</div>
            </div>
        </div>
    </div>

    <script>
        var REO_CONFIG = {
            username: 'abhijeetr7', 
            repo: 'photolibrary',      
            branch: 'main' 
        };

        var OS_STATE = {
            duration: 8000,
            loopId: null,
            queue: [],
            pointer: 0,
            currentNode: null,
            nextNode: null
        };

        function initClockUpdates() {
            var update = function() {
                var now = new Date();
                var hours = now.getHours();
                var displayHours = hours % 12 || 12;
                var minutes = String(now.getMinutes());
                if (minutes.length < 2) minutes = '0' + minutes;
                document.getElementById('ui-time').innerHTML = (displayHours < 10 ? '0' + displayHours : displayHours) + ':' + minutes;
                
                var days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
                var months = ['JUNE', 'JULY', 'AUG', 'SEPT', 'OCT', 'NOV', 'DEC', 'JAN', 'FEB', 'MAR', 'APR', 'MAY'];
                document.getElementById('ui-date').innerText = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
            };
            setInterval(update, 1000);
            update();
        }

        function buildLayerNode(url) {
            var wrapper = document.createElement('div');
            wrapper.style.cssText = 'position:absolute; width:100%; height:100%; top:0; left:0; opacity:0; display:block; background-color:#000;';
            wrapper.style.transition = 'opacity 2000ms ease-in-out';
            wrapper.style.webkitTransition = 'opacity 2000ms ease-in-out';

            var ext = url.split('.').pop().toLowerCase();
            var isVideo = (ext === 'mp4' || ext === 'mov' || ext === 'm4v');

            if (isVideo) {
                var video = document.createElement('video');
                video.src = url;
                video.style.cssText = 'position:absolute; max-width:100%; max-height:100%; top:50%; left:50%; transform:translate(-50%, -50%); -webkit-transform:translate(-50%, -50%); z-index:2;';
                video.autoplay = true;
                video.muted = true;
                video.playsInline = true;
                video.setAttribute('playsinline', 'true');
                video.setAttribute('webkit-playsinline', 'true');
                
                wrapper.appendChild(video);
                return { wrapper: wrapper, fg: video, isVideo: true };
            } else {
                var fg = document.createElement('img');
                fg.crossOrigin = "anonymous";
                fg.src = url;
                fg.style.cssText = 'position:absolute; max-width:100%; max-height:100%; top:50%; left:50%; z-index:2;';
                fg.style.transform = 'translate(-50%, -50%) scale(1)';
                fg.style.webkitTransform = 'translate(-50%, -50%) scale(1)';

                wrapper.appendChild(fg);
                return { wrapper: wrapper, fg: fg, isVideo: false };
            }
        }

        function preloadNextShadowNode() {
            if (OS_STATE.queue.length <= 1) return;
            OS_STATE.pointer = (OS_STATE.pointer + 1) % OS_STATE.queue.length;
            var data = buildLayerNode(OS_STATE.queue[OS_STATE.pointer]);
            OS_STATE.nextNode = data.wrapper;
            OS_STATE.nextNode.style.zIndex = "1";
            document.getElementById('stage').appendChild(OS_STATE.nextNode);
        }

        function executeKenBurns(element) {
            element.style.transition = 'none';
            element.style.webkitTransition = 'none';
            element.style.transform = 'translate(-50%, -50%) scale(1)';
            element.style.webkitTransform = 'translate(-50%, -50%) scale(1)';
            
            setTimeout(function() {
                element.style.transition = 'transform 12000ms linear';
                element.style.webkitTransition = '-webkit-transform 12000ms linear';
                element.style.transform = 'translate(-50%, -50%) scale(1.08)';
                element.style.webkitTransform = 'translate(-50%, -50%) scale(1.08)';
            }, 100);
        }

        function transitionNext() {
            if (!OS_STATE.nextNode || OS_STATE.queue.length <= 1) return;

            var oldCurrent = OS_STATE.currentNode;
            var incoming = OS_STATE.nextNode;
            
            var isVideo = incoming.getElementsByTagName('video').length > 0;
            var mediaElement = isVideo ? incoming.getElementsByTagName('video')[0] : incoming.getElementsByTagName('img')[0];

            incoming.style.zIndex = "10";
            if (oldCurrent) oldCurrent.style.zIndex = "5";

            if (isVideo) {
                try { mediaElement.play(); } catch(e){}
            } else {
                executeKenBurns(mediaElement);
            }

            incoming.style.opacity = "1";

            setTimeout(function() {
                if (oldCurrent && oldCurrent.parentNode === document.getElementById('stage')) {
                    var oldVideo = oldCurrent.getElementsByTagName('video')[0];
                    if (oldVideo) { oldVideo.pause(); oldVideo.src = ""; }
                    document.getElementById('stage').removeChild(oldCurrent);
                }
            }, 2100);

            OS_STATE.currentNode = incoming;
            preloadNextShadowNode();
        }

        function startLoop() {
            var run = function() {
                transitionNext();
                OS_STATE.loopId = setTimeout(run, OS_STATE.duration);
            };
            OS_STATE.loopId = setTimeout(run, OS_STATE.duration);
        }

        function primePipeline(urlArray) {
            var stage = document.getElementById('stage');
            stage.innerHTML = ''; 
            OS_STATE.queue = urlArray;
            OS_STATE.pointer = 0;
            if (OS_STATE.queue.length === 0) return;

            var data = buildLayerNode(OS_STATE.queue[OS_STATE.pointer]);
            OS_STATE.currentNode = data.wrapper;
            OS_STATE.currentNode.style.zIndex = "10";
            OS_STATE.currentNode.style.opacity = "1";
            stage.appendChild(OS_STATE.currentNode);
            
            if (data.isVideo) {
                try { data.fg.play(); } catch(e){}
            } else {
                executeKenBurns(data.fg);
            }
            preloadNextShadowNode();
        }

        function loadRepositoryStructure() {
            var url = 'https://api.github.com/repos/' + REO_CONFIG.username + '/' + REO_CONFIG.repo + '/contents';
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var contents = JSON.parse(xhr.responseText);
                    var folders = [];

                    for(var i = 0; i < contents.length; i++) {
                        if(contents[i].type === 'dir') {
                            folders.push(contents[i]);
                        }
                    }
                    
                    var dropdown = document.getElementById('cfg-album');
                    dropdown.innerHTML = '';

                    if (folders.length === 0) {
                        dropdown.innerHTML = '<option value="">No folders found</option>';
                        return;
                    }

                    for(var j = 0; j < folders.length; j++) {
                        var opt = document.createElement('option');
                        opt.value = folders[j].path;
                        opt.innerText = folders[j].name;
                        dropdown.appendChild(opt);
                    }

                    // Automatically switch to the first folder (Landscapes) at bootup
                    syncNewFolder(folders[0].path, OS_STATE.duration);
                }
            };
            xhr.send();
        }

        function syncNewFolder(folderPath, newDuration) {
            if(!folderPath) return;
            clearTimeout(OS_STATE.loopId);
            OS_STATE.duration = newDuration;

            var url = 'https://api.github.com/repos/' + REO_CONFIG.username + '/' + REO_CONFIG.repo + '/contents/' + encodeURIComponent(folderPath);
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var files = JSON.parse(xhr.responseText);
                    var imageUrls = [];
                    var validExtensions = ['jpg', 'jpeg', 'png', 'webp', 'gif', 'mp4', 'mov'];
                    
                    for (var i = 0; i < files.length; i++) {
                        var file = files[i];
                        var ext = file.name.split('.').pop().toLowerCase();
                        if (file.type === 'file' && validExtensions.indexOf(ext) !== -1) {
                            var rawUrl = 'https://raw.githubusercontent.com/' + REO_CONFIG.username + '/' + REO_CONFIG.repo + '/' + REO_CONFIG.branch + '/' + file.path;
                            imageUrls.push(rawUrl);
                        }
                    }
                    
                    if(imageUrls.length > 0) {
                        // Dynamically update dropdown selection value to stay in sync
                        document.getElementById('cfg-album').value = folderPath;
                        primePipeline(imageUrls);
                        startLoop();
                    }
                }
            };
            xhr.send();
        }

        function fetchWeather() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(function(pos) {
                var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + pos.coords.latitude + '&longitude=' + pos.coords.longitude + '&current_weather=true';
                var xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        var data = JSON.parse(xhr.responseText);
                        if (data && data.current_weather) {
                            var temp = Math.round(data.current_weather.temperature);
                            document.getElementById('ui-weather').innerHTML = '<div class="weather-primary-row">☀️ ' + temp + '°C</div>';
                        }
                    }
                };
                xhr.send();
            });
        }

        window.onload = function() {
            initClockUpdates();
            loadRepositoryStructure();
            fetchWeather();
        };
    </script>
</body>
</html>
